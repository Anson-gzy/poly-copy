name: poly-copy watch

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install -U pip
          pip install "polymarket-client" --pre
          pip install -e ".[dev]"
      - name: Sync universe (10 wallets) + paper follow
        run: |
          set -euo pipefail
          mkdir -p out
          poly-copy universe sync | tee out/universe.json
          cp -f dashboard/universe.json out/universe.json
          # paper/watch must not crash the job on a single bad wallet/API row
          poly-copy paper --universe --mode portfolio --limit 40 | tee out/paper.json
          poly-copy watch --universe --once --interval 1 --mode portfolio | tee out/watch.json || true
      - name: Commit universe state
        run: |
          git config user.name "poly-copy-bot"
          git config user.email "poly-copy-bot@users.noreply.github.com"
          git add dashboard/universe.json dashboard/ledger.json dashboard/equity.json || true
          git diff --cached --quiet || git commit -m "chore: refresh universe $(date -u +%Y-%m-%dT%H:%MZ)"
          git pull --rebase --autostash || true
          git push || true
      - uses: actions/upload-artifact@v4
        with:
          name: poly-copy-watch
          path: out/
          retention-days: 7
      - run: pytest -q
